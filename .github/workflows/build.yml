name: build-windows-exe
on:
  push:
    tags: ["v*"]
  workflow_dispatch:
permissions:
  contents: write
jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - run: pytest -q
      - run: pyinstaller --noconfirm --onefile --windowed --name 工作计划 run.py
      - uses: actions/upload-artifact@v4
        with:
          name: 工作计划-windows-exe
          path: dist/工作计划.exe
      - name: 打包便携版压缩包(exe + 使用说明)
        run: |
          New-Item -ItemType Directory -Path "pkg/工作计划" -Force | Out-Null
          Copy-Item "dist/工作计划.exe" "pkg/工作计划/"
          Copy-Item "packaging/使用说明.txt" "pkg/工作计划/"
          Compress-Archive -Path "pkg/工作计划" -DestinationPath "dist/WorkPlanManager-${{ github.ref_name }}-windows.zip"
      - name: 读取标签注释作为发布说明
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          git fetch --force origin "+refs/tags/${{ github.ref_name }}:refs/tags/${{ github.ref_name }}"
          $msg = git tag -l --format='%(contents)' '${{ github.ref_name }}'
          if ($msg -is [array]) { $msg = $msg -join "`n" }
          Set-Content -Path release_notes.md -Value $msg -Encoding UTF8
      - name: 创建 Release 并附上压缩包
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/WorkPlanManager-${{ github.ref_name }}-windows.zip
          body_path: release_notes.md
          generate_release_notes: true
